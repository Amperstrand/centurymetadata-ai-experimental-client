name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start preview server (wrangler pages dev)
        run: |
          for attempt in 1 2 3; do
            echo "=== Wrangler start attempt $attempt ==="
            npx wrangler pages dev dist --port 8788 > /tmp/wrangler.log 2>&1 &
            echo $! > /tmp/wrangler.pid
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8788 >/dev/null 2>&1; then
                echo "Server ready after ${i}s (attempt $attempt)"
                # Verify stability: require 3 consecutive successful checks
                stable=0
                for j in 1 2 3; do
                  sleep 1
                  if curl -sf http://localhost:8788 >/dev/null 2>&1; then
                    stable=$((stable + 1))
                  else
                    echo "Server unstable (check $j failed)"
                    break
                  fi
                done
                if [ "$stable" -eq 3 ]; then
                  echo "Server stable after $((i + 3))s"
                  exit 0
                fi
              fi
              sleep 1
            done
            echo "Attempt $attempt failed — wrangler log:"
            cat /tmp/wrangler.log
            kill $(cat /tmp/wrangler.pid) 2>/dev/null || true
            sleep 2
          done
          echo "All 3 wrangler start attempts failed"
          exit 1

      - name: Run tests
        run: SERVER=http://localhost:8788 npx playwright test
        env:
          CI: true

      - name: Stop preview server
        if: always()
        run: kill $(cat /tmp/wrangler.pid) 2>/dev/null || true

      - name: Copy screenshots and videos to test-results for evidence publishing
        if: always()
        run: |
          mkdir -p test-results/screenshots test-results/videos
          cp test/screenshots/*.png test-results/screenshots/ 2>/dev/null || true
          find test-results -name "*.webm" -exec cp {} test-results/videos/ \; 2>/dev/null || true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            test-results/
            test/screenshots/
            test/report/
          retention-days: 14

      - name: Publish test evidence to Nostr/Blossom
        if: always() && github.ref == 'refs/heads/main'
        env:
          PUBLISH_NSEC: ${{ secrets.PUBLISH_NSEC }}
          PROJECT_TAG: centurymetadata-ai-experimental-client
        run: |
          if [ -z "$PUBLISH_NSEC" ]; then echo "No PUBLISH_NSEC secret — skipping evidence publish"; exit 0; fi

          # Install nak (Nostr CLI by fiatjaf — public)
          NAK_URL=$(curl -sS https://api.github.com/repos/fiatjaf/nak/releases/latest | \
            python3 -c "import json,sys;[print(a['browser_download_url']) for a in json.load(sys.stdin)['assets'] if 'linux-amd64' in a['name']]" 2>/dev/null | head -1)
          if [ -n "$NAK_URL" ]; then
            curl -sL "$NAK_URL" -o /usr/local/bin/nak && chmod +x /usr/local/bin/nak
          fi
          nak --help >/dev/null 2>&1 || { echo "nak unavailable — skipping"; exit 0; }

          # Install nostr-publish (Amperstrand — public repo)
          pip install "git+https://github.com/Amperstrand/nostr-publish-file-metadata-action.git" requests certifi --quiet 2>/dev/null || {
            echo "nostr-publish install failed — skipping"; exit 0;
          }

          # Generate summary.json from Playwright report.json
          node test/generate-summary.mjs test-results/ || true

          # Extract pass/fail counts from summary.json
          PASSED=$(python3 -c "import json;d=json.load(open('test-results/summary.json'));print(d.get('passed',0))" 2>/dev/null || echo 0)
          FAILED=$(python3 -c "import json;d=json.load(open('test-results/summary.json'));print(d.get('failed',0))" 2>/dev/null || echo 0)
          SKIPPED=$(python3 -c "import json;d=json.load(open('test-results/summary.json'));print(d.get('skipped',0))" 2>/dev/null || echo 0)

          # Configure Nostr identity
          mkdir -p ~/.config/prta
          echo "$PUBLISH_NSEC" > ~/.config/prta/nsec

          # Publish to Blossom + Nostr relays
          nostr-publish test-results/ \
            --nsec-file ~/.config/prta/nsec \
            --blossom-server https://blossom.psbt.me \
            --relays wss://relay.cashu.email,wss://relay.damus.io,wss://nos.lol \
            --branch "${{ github.ref_name }}" \
            --commit "${{ github.sha }}" \
            --passed "$PASSED" \
            --failed "$FAILED" \
            --skipped "$SKIPPED" \
            || echo "Publish failed (non-blocking)"

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=centurymetadata-ai-experimental-client
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
